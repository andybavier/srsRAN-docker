name: Build test gNB image

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: srsRAN Project branch, tag, or commit
        required: true
        default: 2be82d8ea38e3a729850b702254952c04118cc38
      image_tag:
        description: GHCR image tag
        required: true
        default: test-2be82d8

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish gNB
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-gnb
          target: gnb
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/srsran-gnb:${{ inputs.image_tag }}
          build-args: |
            SRSRAN_REF=${{ inputs.upstream_ref }}
            MARCH=x86-64
            VERSION=${{ inputs.image_tag }}
            VCS_URL=${{ github.server_url }}/${{ github.repository }}
            VCS_REF=${{ github.sha }}
            UPSTREAM_COMMIT=${{ inputs.upstream_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
