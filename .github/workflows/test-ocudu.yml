name: Build test OCUDU image

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: OCUDU branch, tag, or commit
        required: true
        default: release_26_04
      image_tag:
        description: GHCR image tag
        required: true
        default: test-min-pool-4
      march:
        description: Compiler CPU architecture target
        required: true
        default: x86-64-v2
      force_min_pool_workers:
        description: Override min_pool_workers in worker_manager.cpp
        required: true
        default: "4"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish OCUDU
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-ocudu
          target: ocudu
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ocudu:${{ inputs.image_tag }}
          build-args: |
            OCUDU_REF=${{ inputs.upstream_ref }}
            FORCE_MIN_POOL_WORKERS=${{ inputs.force_min_pool_workers }}
            MARCH=${{ inputs.march }}
            VERSION=${{ inputs.image_tag }}
            VCS_URL=${{ github.server_url }}/${{ github.repository }}
            VCS_REF=${{ github.sha }}
            UPSTREAM_COMMIT=${{ inputs.upstream_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
