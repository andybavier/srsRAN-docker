name: Build test UE image

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: srsRAN 4G branch, tag, or commit
        required: true
        default: eea87b1d893ae58e0b08bc381730c502024ae71f
      image_tag:
        description: GHCR image tag
        required: true
        default: test-eea87b1-x86-64-v2
      march:
        description: Compiler CPU architecture target
        required: true
        default: x86-64-v2

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish UE
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-ue
          target: ue
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/srsran-ue:${{ inputs.image_tag }}
          build-args: |
            SRSRAN_REF=${{ inputs.upstream_ref }}
            MARCH=${{ inputs.march }}
            VERSION=${{ inputs.image_tag }}
            VCS_URL=${{ github.server_url }}/${{ github.repository }}
            VCS_REF=${{ github.sha }}
            UPSTREAM_COMMIT=${{ inputs.upstream_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
