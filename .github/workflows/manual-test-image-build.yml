name: Manual Test Image Build

on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: Docker tag to publish
        required: true
        default: test-portable-march
      docker_targets:
        description: Space-separated Makefile targets to build
        required: true
        default: "gnb ocudu"

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.prepare.outputs.targets }}
    steps:
      - name: Prepare matrix targets
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          read -r -a targets <<< "${{ inputs.docker_targets }}"
          json=$(printf '%s\n' "${targets[@]}" | jq -R . | jq -s -c .)
          echo "targets=$json" >> "$GITHUB_OUTPUT"

  manual-image-build:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.prepare-matrix.outputs.targets) }}
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_REGISTRY: ghcr.io/
      DOCKER_REPOSITORY: ${{ github.repository_owner }}/
      DOCKER_TARGETS: ${{ matrix.target }}
      DOCKER_TAG: ${{ inputs.docker_tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.target }}
        run: |
          make docker-build
          make docker-push
